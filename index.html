<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum Virtual 2026 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .pegada { background: linear-gradient(135deg, #059669 0%, #064e3b 100%); border: 2px solid #34d399; }
        .vacia { border: 2px dashed #374151; background: #1f2937; }
    </style>
</head>
<body class="bg-gray-950 text-white font-sans min-h-screen">

    <div class="max-w-md mx-auto p-4">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-black text-green-500 uppercase tracking-tighter">Álbum 2026</h1>
            <select id="team-selector" onchange="cambiarPagina()" class="bg-gray-800 p-2 rounded-lg text-sm border border-gray-700">
                <option value="ARG">Argentina (ARG)</option>
                <option value="BRA">Brasil (BRA)</option>
                <option value="MEX">México (MEX)</option>
                <option value="FWC">FIFA (FWC)</option>
            </select>
        </header>

        <div id="grid-container" class="grid grid-cols-4 gap-3 bg-gray-900 p-4 rounded-2xl border border-gray-800"></div>

        <div class="mt-8 flex gap-3">
            <button onclick="document.getElementById('file-input').click()" class="flex-1 bg-green-600 hover:bg-green-500 py-4 rounded-xl font-bold shadow-xl transition-all active:scale-95">
                <i class="fas fa-camera mr-2"></i> Escanear
            </button>
        </div>
        <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleImage(this)">
    </div>

    <div id="scanner-processing" class="fixed inset-0 bg-black/95 hidden flex-col items-center justify-center z-50 p-6 text-center">
        <div class="w-16 h-16 border-4 border-green-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-green-400 font-bold">Consultando a la IA...</p>
    </div>

    <script>
        const GEMINI_API_KEY = "AIzaSyBa7bEQ9DIN6luKEuEWPmAO-Fr2Y-95kBc";
        let estadoAlbum = JSON.parse(localStorage.getItem('album2026') || '{}');

        function renderGrid() {
            const equipo = document.getElementById('team-selector').value;
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            
            if (!estadoAlbum[equipo]) estadoAlbum[equipo] = [];

            for(let i = 1; i <= 20; i++) {
                const esPegada = estadoAlbum[equipo].includes(i);
                container.innerHTML += `
                    <div id="slot-${i}" onclick="toggleSlot(${i})" class="h-16 flex items-center justify-center rounded-xl cursor-pointer transition-all ${esPegada ? 'pegada' : 'vacia'} font-bold">
                        ${i}
                    </div>
                `;
            }
        }

        function toggleSlot(num) {
            const equipo = document.getElementById('team-selector').value;
            const idx = estadoAlbum[equipo].indexOf(num);
            if(idx > -1) estadoAlbum[equipo].splice(idx, 1);
            else estadoAlbum[equipo].push(num);
            localStorage.setItem('album2026', JSON.stringify(estadoAlbum));
            renderGrid();
        }

        function cambiarPagina() { renderGrid(); }

        async function handleImage(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => analizarImagenIA(e.target.result.split(',')[1]);
            reader.readAsDataURL(file);
        }

        async function analizarImagenIA(base64) {
            document.getElementById('scanner-processing').classList.remove('hidden');
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Analiza la página y devuelve JSON: {\"equipo\": \"ARG\", \"pegados\": [1,2]}." }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }] })
                });
                const data = await response.json();
                const json = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ''));
                
                estadoAlbum[json.equipo] = json.pegados;
                localStorage.setItem('album2026', JSON.stringify(estadoAlbum));
                document.getElementById('team-selector').value = json.equipo;
                renderGrid();
            } catch(e) { alert("Error al escanear, intenta de nuevo."); }
            document.getElementById('scanner-processing').classList.add('hidden');
        }

        renderGrid();
    </script>
</body>
</html>
